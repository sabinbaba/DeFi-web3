specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: SecureVault
    network: sepolia
    source:
      address: "0x43a4B9049cF78642539b2e6e6a58330b30dB1689"
      abi: SecureVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Deposited
        - LegalDocUpdated
        - OwnershipTransferred
        - Withdrawn
      abis:
        - name: SecureVault
          file: ./abis/SecureVault.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: LegalDocUpdated(indexed address,string)
          handler: handleLegalDocUpdated
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/secure-vault.ts
